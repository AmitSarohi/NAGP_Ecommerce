name: Deploy User Service

on:
  push:
    branches:
      - all-changes
    paths:
      - 'services/user-service/**'
      - 'infrastructure/kubernetes/user-service.yaml'
      - 'infrastructure/kubernetes/configmaps.yaml'
      - '.github/workflows/deploy-user-service.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-north-1
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-north-1.amazonaws.com
      DEPLOYMENT_GUID: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push User Service Image
        run: |
          docker build -t user-service ./services/user-service
          docker tag user-service:latest $ECR_REGISTRY/user-service:${{ github.sha }}
          docker push $ECR_REGISTRY/user-service:${{ github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Create namespace
        run: |
          kubectl create namespace ecommerce --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Secrets (OAuth Credentials)
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          # Substitute environment variables into the secrets file
          envsubst < infrastructure/kubernetes/user-service-secrets.yaml > /tmp/user-service-secrets.yaml
          kubectl apply -f /tmp/user-service-secrets.yaml
          rm /tmp/user-service-secrets.yaml
          echo "✅ Applied OAuth secrets"

      - name: Inject Dynamic Deployment GUID
        run: |
          kubectl patch configmap user-service-config \
            --namespace=ecommerce \
            --type=merge \
            -p '{"data":{"DEPLOYMENT_GUID":"'${{ github.sha }}'"}}'
          echo "Set DEPLOYMENT_GUID to ${{ github.sha }}"

      - name: Verify ConfigMap Update
        run: |
          echo "Verifying DEPLOYMENT_GUID in ConfigMap..."
          GUID=$(kubectl get configmap user-service-config -n ecommerce -o jsonpath='{.data.DEPLOYMENT_GUID}')
          if [ "$GUID" != "${{ github.sha }}" ]; then
            echo "ERROR: ConfigMap GUID mismatch! Expected: ${{ github.sha }}, Got: $GUID"
            exit 1
          fi
          echo "ConfigMap verified: DEPLOYMENT_GUID = $GUID"

      - name: Deploy User Service with New Image
        run: |
          kubectl apply -f infrastructure/kubernetes/user-service.yaml
          kubectl set image deployment/user-service \
            user-service=$ECR_REGISTRY/user-service:${{ github.sha }} -n ecommerce
          echo "Set new image, rollout will pick up updated ConfigMap"

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/user-service -n ecommerce --timeout=120s
