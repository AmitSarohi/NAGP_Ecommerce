apiVersion: v1
kind: ServiceMonitor
metadata:
  name: user-service-monitor
  namespace: ecommerce
  labels:
    app: user-service
spec:
  selector:
    matchLabels:
      app: user-service
  endpoints:
  - port: http
    path: /api/health
    interval: 30s
    scrapeTimeout: 10s
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: product-service-monitor
  namespace: ecommerce
  labels:
    app: product-service
spec:
  selector:
    matchLabels:
      app: product-service
  endpoints:
  - port: http
