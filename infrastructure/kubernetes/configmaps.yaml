apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: ecommerce
data:
  NODE_ENV: "production"
  PORT: "3001"
  AWS_REGION: "eu-north-1"
  DYNAMODB_REGION: "eu-north-1"
  USER_TABLE: "users"
  JWT_EXPIRES_IN: "24h"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  DEPLOYMENT_GUID: "dev"  # Updated by CI/CD pipeline
  # Google OAuth Configuration (set via environment variables or secrets)
  # GOOGLE_CLIENT_ID: ""
  # GOOGLE_CLIENT_SECRET: ""
  # GOOGLE_CALLBACK_URL: "/api/auth/google/callback"
  # FRONTEND_URL: "http://localhost:3000"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-service-config
  namespace: ecommerce
data:
  NODE_ENV: "production"
  PORT: "3002"
  AWS_REGION: "eu-north-1"
  DYNAMODB_REGION: "eu-north-1"
  PRODUCT_TABLE: "products"
  CATEGORY_TABLE: "categories"
  AWS_S3_REGION: "eu-north-1"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "200"
  SEARCH_SERVICE_URL: "http://search-service:3003"
  DEPLOYMENT_GUID: "dev"  # Updated by CI/CD pipeline

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: search-service-config
  namespace: ecommerce
data:
  NODE_ENV: "production"
  PORT: "3003"
  OPENSEARCH_INDEX: "products"
  PRODUCT_SERVICE_URL: "http://product-service:3002"  # ✅ correct (internal)
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "300"
  DEPLOYMENT_GUID: "dev"  # Updated by CI/CD pipeline

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: ecommerce
data:
  REACT_APP_PRODUCT_SERVICE_URL: "/api/products"
  REACT_APP_SEARCH_SERVICE_URL: "/api/search"
  REACT_APP_API_URL: "/api"
  REACT_APP_DEPLOYMENT_GUID: "PROD"