apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: ecommerce
spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: search-service

  template:
    metadata:
      labels:
        app: search-service

    spec:
      imagePullSecrets:
        - name: ecr-secret

      containers:
      - name: search-service
        image: 160823835826.dkr.ecr.eu-north-1.amazonaws.com/search-service:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3003

        envFrom:
        - configMapRef:
            name: search-service-config
        - secretRef:
            name: search-service-secrets

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"

        livenessProbe:
          httpGet:
            path: /api/health/live
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 5

        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false   # ✅ FIXED

---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: ecommerce
spec:
  selector:
    app: search-service
  ports:
    - port: 3003
      targetPort: 3003