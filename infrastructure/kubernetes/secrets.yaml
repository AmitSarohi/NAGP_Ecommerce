apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  namespace: ecommerce
type: Opaque
data:
  AWS_ACCESS_KEY_ID: <base64-encoded-aws-access-key>
  AWS_SECRET_ACCESS_KEY: <base64-encoded-aws-secret-key>
  JWT_SECRET: <base64-encoded-jwt-secret>
---
apiVersion: v1
kind: Secret
metadata:
  name: product-service-secrets
  namespace: ecommerce
type: Opaque
data:
  AWS_ACCESS_KEY_ID: <base64-encoded-aws-access-key>
  AWS_SECRET_ACCESS_KEY: <base64-encoded-aws-secret-key>
  AWS_S3_BUCKET: <base64-encoded-s3-bucket-name>
---
apiVersion: v1
kind: Secret
metadata:
  name: search-service-secrets
  namespace: ecommerce
type: Opaque
data:
  OPENSEARCH_ENDPOINT: <base64-encoded-opensearch-endpoint>
  OPENSEARCH_USERNAME: <base64-encoded-opensearch-username>
  OPENSEARCH_PASSWORD: <base64-encoded-opensearch-password>
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-secret
  namespace: ecommerce
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <base64-encoded-docker-config>
