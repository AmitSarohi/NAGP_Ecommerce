AWSTemplateFormatVersion: '2010-09-09'
Description: 'E-Commerce Platform CI/CD Pipeline'

Parameters:
  ProjectName:
    Type: String
    Default: 'ecommerce-platform'
    Description: 'Name of the project'

  GitHubOwner:
    Type: String
    Default: 'your-github-username'
    Description: 'GitHub repository owner'

  GitHubRepo:
    Type: String
    Default: 'ecommerce-platform'
    Description: 'GitHub repository name'

  GitHubBranch:
    Type: String
    Default: 'main'
    Description: 'GitHub branch to monitor'

  GitHubToken:
    Type: String
    NoEcho: true
    Description: 'GitHub personal access token'

  ECRRepositoryUser:
    Type: String
    Default: 'ecommerce-user-service'
    Description: 'ECR repository for user service'

  ECRRepositoryProduct:
    Type: String
    Default: 'ecommerce-product-service'
    Description: 'ECR repository for product service'

  ECRRepositorySearch:
    Type: String
    Default: 'ecommerce-search-service'
    Description: 'ECR repository for search service'

  ECRRepositoryFrontend:
    Type: String
    Default: 'ecommerce-frontend'
    Description: 'ECR repository for frontend'

  EksClusterName:
    Type: String
    Default: 'ecommerce-eks'
    Description: 'EKS cluster name'

Resources:
  # CodePipeline
  CodePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub '${ProjectName}-pipeline'
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: '1'
              Configuration:
                Owner: !Ref GitHubOwner
                Repo: !Ref GitHubRepo
                Branch: !Ref GitHubBranch
                OAuthToken: !Ref GitHubToken
                PollForSourceChanges: true
              OutputArtifacts:
                - Name: SourceCode

        - Name: Build
          Actions:
            - Name: BuildUser
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildUser
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: UserBuildOutput
              RunOrder: 1

            - Name: BuildProduct
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildProduct
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: ProductBuildOutput
              RunOrder: 2

            - Name: BuildSearch
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildSearch
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: SearchBuildOutput
              RunOrder: 3

            - Name: BuildFrontend
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildFrontend
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: FrontendBuildOutput
              RunOrder: 4

        - Name: Deploy
          Actions:
            - Name: DeployToKubernetes
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeployToEKS
                Version: '1'
              Configuration:
                ClusterName: !Ref EksClusterName
                ServiceName: !Ref CodeDeployService
                DeploymentGroupName: !Ref CodeDeployDeploymentGroup
              InputArtifacts:
                - Name: UserBuildOutput
                - Name: ProductBuildOutput
                - Name: SearchBuildOutput
                - Name: FrontendBuildOutput
              Region: !Ref AWS::Region

  # CodeBuild Projects
  CodeBuildUser:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-user-service-build'
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: services/user-service/buildspec.yml
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:4.0
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: ECR_REPOSITORY_URI
            Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepositoryUser}'
          - Name: IMAGE_TAG
            Value: '!Ref "AWS::AccountId"'
      Artifacts:
        Type: CODEPIPELINE

  CodeBuildProduct:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-product-service-build'
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: services/product-service/buildspec.yml
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:4.0
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: ECR_REPOSITORY_URI
            Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepositoryProduct}'
          - Name: IMAGE_TAG
            Value: '!Ref "AWS::AccountId"'
      Artifacts:
        Type: CODEPIPELINE

  CodeBuildSearch:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-search-service-build'
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: services/search-service/buildspec.yml
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:4.0
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: ECR_REPOSITORY_URI
            Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepositorySearch}'
          - Name: IMAGE_TAG
            Value: '!Ref "AWS::AccountId"'
      Artifacts:
        Type: CODEPIPELINE

  CodeBuildFrontend:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-frontend-build'
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: frontend/buildspec.yml
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:4.0
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: ECR_REPOSITORY_URI
            Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepositoryFrontend}'
          - Name: IMAGE_TAG
            Value: '!Ref "AWS::AccountId"'
          - Name: REACT_APP_DEPLOYMENT_GUID
            Value: !Sub '${AWS::StackName}-${AWS::Region}'
      Artifacts:
        Type: CODEPIPELINE

  # CodeDeploy
  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub '${ProjectName}-eks-app'
      ComputePlatform: ECS

  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: !Sub '${ProjectName}-eks-deployment-group'
      DeploymentConfigName: CodeDeployDefault.EKSAllAtOnce
      ServiceRoleArn: !GetAtt CodeDeployRole.Arn
      DeploymentStyle:
        DeploymentType: BLUE_GREEN
        DeploymentOption: WITH_TRAFFIC_CONTROL
      BlueGreenDeploymentConfiguration:
        TerminateBlueInstancesOnDeploymentSuccess: true
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
      Target:
        ECS:
          ServiceName: !Ref CodeDeployService
          TaskSets: ['primary']

  # IAM Roles
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-codepipeline-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetBucketVersioning
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub '${ArtifactBucket}/*'
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                  - codebuild:BatchGetProjects
                Resource: '*'
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetApplication
                  - codedeploy:RegisterApplicationRevision
                Resource: '*'

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-codebuild-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:BatchCheckLayerAvailability
                  - ecr:PutImage
                  - ecr:BatchGetImage
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetBucketVersioning
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub '${ArtifactBucket}/*'

  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-codedeploy-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:RegisterTaskDefinition
                  - ecs:UpdateService
                  - ecs:CreateTaskSet
                  - ecs:UpdateTaskSet
                  - ecs:DeleteTaskSet
                  - cloudwatch:DescribeAlarms
                  - application-autoscaling:PutScalingPolicy
                  - application-autoscaling:DescribeScalingPolicies
                  - application-autoscaling:DescribeScalableTargets
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:ModifyListener
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - autoscaling:DescribeAutoScalingGroups
                  - autoscaling:DescribeLaunchConfigurations
                  - autoscaling:DescribeScalingActivities
                  - autoscaling:CompleteLifecycleAction
                  - iam:PassRole
                Resource: '*'

  # S3 Bucket for artifacts
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-artifacts-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled

  # ECS Service for CodeDeploy
  CodeDeployService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub '${ProjectName}-service'
      Cluster: !Ref EksClusterName
      TaskDefinition: !Ref CodeDeployTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref CodeDeploySecurityGroup
          Subnets:
            - !Sub 'subnet-${AWS::Region}a'
            - !Sub 'subnet-${AWS::Region}b'

  CodeDeployTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-task'
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt CodeDeployTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt CodeDeployTaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepositoryUser}:latest'
          PortMappings:
            - ContainerPort: 3001

  CodeDeployTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-task-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  CodeDeployTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  CodeDeploySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-sg'
      GroupDescription: 'Security group for CodeDeploy'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

Outputs:
  CodePipelineName:
    Description: 'CodePipeline name'
    Value: !Ref CodePipeline

  CodeBuildProjects:
    Description: 'CodeBuild project names'
    Value:
      User: !Ref CodeBuildUser
      Product: !Ref CodeBuildProduct
      Search: !Ref CodeBuildSearch
      Frontend: !Ref CodeBuildFrontend

  ArtifactBucketName:
    Description: 'S3 bucket name for artifacts'
    Value: !Ref ArtifactBucket
